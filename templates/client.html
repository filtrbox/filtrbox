<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FILTRBOX — Ma piscine</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }
header { background: #1565C0; color: white; padding: 16px 20px; text-align: center; }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
header p  { font-size: 13px; opacity: .75; margin-top: 4px; }
.container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
.card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
.status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.device-name { font-size: 17px; font-weight: 600; }
.badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.online  { background: #E8F5E9; color: #2E7D32; }
.offline { background: #FFEBEE; color: #C62828; }
.mode-box { background: linear-gradient(135deg, #1565C0, #1976D2); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px; color: white; }
.mode-label { font-size: 13px; opacity: .8; margin-bottom: 6px; }
.mode-value { font-size: 32px; font-weight: 700; }
.mode-msg   { font-size: 13px; opacity: .75; margin-top: 6px; }
.pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.pill { background: #f0f4f8; border-radius: 20px; padding: 6px 14px; font-size: 13px; }
.pill b { color: #1565C0; }
.pill.on  b { color: #2E7D32; }
.pill.off b { color: #888; }
.section-title { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mode-btn { padding: 14px 10px; border: 2px solid #e0e0e0; border-radius: 12px; background: white; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .15s; text-align: center; }
.mode-btn:hover  { border-color: #1565C0; color: #1565C0; background: #f0f6ff; }
.mode-btn.active { border-color: #1565C0; background: #1565C0; color: white; }
.mode-btn.arret  { border-color: #e0e0e0; color: #C62828; }
.mode-btn.arret:hover { border-color: #C62828; background: #fff5f5; }
.vannes-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.vanne { border-radius: 8px; padding: 8px 4px; text-align: center; font-size: 11px; background: #f5f5f5; }
.vanne .vn { font-weight: 700; margin-bottom: 3px; color: #555; }
.vanne .vs { font-size: 10px; color: #999; }
.vanne.ouvert { background: #E8F5E9; }
.vanne.ouvert .vn { color: #2E7D32; }
.vanne.ouvert .vs { color: #4CAF50; }
.vanne.ferme  { background: #FFEBEE; }
.vanne.ferme  .vn { color: #C62828; }
.vanne.ferme  .vs { color: #EF5350; }
.prog-box { background: #f8f9ff; border: 1.5px solid #e0e8ff; border-radius: 12px; padding: 14px; }
.prog-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 8px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-val { font-weight: 600; color: #1565C0; }
.refresh-info { text-align: center; font-size: 12px; color: #bbb; margin-top: 8px; }
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: white; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
.login-logo { text-align: center; margin-bottom: 24px; }
.login-logo h2 { font-size: 28px; font-weight: 800; color: #1565C0; letter-spacing: 2px; }
.login-logo p  { font-size: 14px; color: #999; margin-top: 4px; }
input { width: 100%; padding: 13px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; margin-bottom: 12px; outline: none; transition: border .15s; }
input:focus { border-color: #1565C0; }
.btn-login { width: 100%; padding: 14px; background: #1565C0; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: .5px; }
.btn-login:hover { background: #1255a8; }
.error-msg { color: #C62828; font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }
.sending { opacity: .5; pointer-events: none; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h2>FILTRBOX</h2>
      <p>Contrôle de votre piscine</p>
    </div>
    <input type="text"     id="username" placeholder="Identifiant">
    <input type="password" id="password" placeholder="Mot de passe">
    <button class="btn-login" onclick="login()">Se connecter</button>
    <div id="login-error" class="error-msg"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>FILTRBOX</h1>
    <p id="device-name-header">Ma piscine</p>
  </header>
  <div class="container">

    <div class="card">
      <div class="status-header">
        <div class="device-name" id="device-name">—</div>
        <span class="badge" id="online-badge">—</span>
      </div>
      <div class="mode-box">
        <div class="mode-label">Mode en cours</div>
        <div class="mode-value" id="mode-value">—</div>
        <div class="mode-msg"  id="mode-msg">—</div>
      </div>
      <div class="pills">
        <div class="pill" id="pill-pompe">Pompe : <b>—</b></div>
        <div class="pill" id="pill-aux">AUX : <b>—</b></div>
        <div class="pill" id="pill-prog">Programmation : <b>—</b></div>
      </div>
      <div class="section-title">État des vannes</div>
      <div class="vannes-grid" id="vannes-grid"></div>
    </div>

    <div class="card">
      <div class="section-title">Changer le mode</div>
      <div class="modes-grid" id="modes-grid"></div>
    </div>

    <div class="card">
      <div class="section-title">Programmation</div>
      <div class="prog-box" id="prog-box">
        <div class="prog-row"><span>Statut</span><span class="prog-val" id="prog-active">—</span></div>
        <div class="prog-row"><span>Début filtration</span><span class="prog-val" id="prog-debut">—</span></div>
        <div class="prog-row"><span>Fin filtration</span><span class="prog-val" id="prog-fin">—</span></div>
      </div>
    </div>

    <div class="refresh-info" id="refresh-info">—</div>

  </div>
</div>

<script>
const API = "";
const MODES = ["Filtration","Lavage","Rinçage","Recirculation","Vidange","Hivernage","Arrêt"];
let creds = {user:"", password:""};
let currentMode = "";

function login() {
  creds.user     = document.getElementById("username").value.trim();
  creds.password = document.getElementById("password").value;
  document.getElementById("login-error").textContent = "";
  fetch(`${API}/api/client/status?user=${creds.user}&password=${creds.password}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) { document.getElementById("login-error").textContent = "Identifiants incorrects"; return; }
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      renderStatus(data);
      setInterval(refresh, 3000);
    })
    .catch(() => { document.getElementById("login-error").textContent = "Erreur de connexion au serveur"; });
}

function refresh() {
  fetch(`${API}/api/client/status?user=${creds.user}&password=${creds.password}`)
    .then(r => r.json())
    .then(renderStatus)
    .catch(() => {});
}

function renderStatus(data) {
  const st = data.status || {};
  document.getElementById("device-name").textContent        = data.name || "Ma piscine";
  document.getElementById("device-name-header").textContent = data.name || "Ma piscine";
  const badge = document.getElementById("online-badge");
  badge.textContent  = data.online ? "En ligne" : "Hors ligne";
  badge.className    = "badge " + (data.online ? "online" : "offline");
  currentMode = st.mode || "—";
  document.getElementById("mode-value").textContent = currentMode;
  document.getElementById("mode-msg").textContent   = st.message || "";
  const pompe = document.getElementById("pill-pompe");
  pompe.innerHTML = `Pompe : <b>${st.pompe ? "ON" : "OFF"}</b>`;
  pompe.className = "pill " + (st.pompe ? "on" : "off");
  const aux = document.getElementById("pill-aux");
  aux.innerHTML = `AUX : <b>${st.aux ? "ON" : "OFF"}</b>`;
  aux.className = "pill " + (st.aux ? "on" : "off");
  const prog = st.prog || {};
  const progEl = document.getElementById("pill-prog");
  progEl.innerHTML = `Prog : <b>${prog.active ? "Active" : "Inactive"}</b>`;
  document.getElementById("prog-active").textContent = prog.active ? "Active" : "Inactive";
  document.getElementById("prog-debut").textContent  = prog.heure_debut || "—";
  document.getElementById("prog-fin").textContent    = prog.heure_fin   || "—";
  const vannes = st.vannes || {};
  document.getElementById("vannes-grid").innerHTML = Object.entries(vannes).map(([v,s]) => {
    const cls   = s.ouvert ? "ouvert" : s.ferme ? "ferme" : "";
    const label = s.ouvert ? "Ouvert" : s.ferme ? "Fermé" : "—";
    return `<div class="vanne ${cls}"><div class="vn">${v}</div><div class="vs">${label}</div></div>`;
  }).join("");
  document.getElementById("modes-grid").innerHTML = MODES.map(m => {
    const active = currentMode === m ? "active" : "";
    const arret  = m === "Arrêt" ? "arret" : "";
    return `<button class="mode-btn ${active} ${arret}" onclick="sendMode('${m}')">${m}</button>`;
  }).join("");
  document.getElementById("refresh-info").textContent = "Mis à jour : " + new Date().toLocaleTimeString("fr-FR");
}

function sendMode(mode) {
  document.getElementById("modes-grid").classList.add("sending");
  fetch(`${API}/api/client/command`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({user:creds.user, password:creds.password, command:{type:"mode", payload:mode}})
  }).then(() => {
    setTimeout(() => {
      document.getElementById("modes-grid").classList.remove("sending");
      refresh();
    }, 1500);
  });
}
</script>
</body>
</html>
