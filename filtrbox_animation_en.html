<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FILTRBOX — Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
}

/* ── BACKGROUND ── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg,#0f4c81,#1a6fa8,#0a2a4a);
  transition: background 1.2s ease;
}

/* ── ROOT LAYOUT ── */
#app {
  position: fixed; inset: 0; z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px;
}

/* ── LOGO ── */
.logo {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(20px, 3.5vw, 42px);
  color: white;
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(255,255,255,0.5), 3px 3px 0 rgba(0,0,0,0.35);
  animation: wobble 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes wobble { 0%,100%{transform:rotate(-1deg) scale(1)} 50%{transform:rotate(1deg) scale(1.03)} }

/* ── PILL ── */
.pill {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(13px, 2.5vw, 26px);
  padding: 5px 28px;
  border-radius: 999px;
  letter-spacing: 2px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 3px 3px 0 rgba(0,0,0,0.2);
  flex-shrink: 0;
  animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { 0%{transform:scale(0.3);opacity:0} 100%{transform:scale(1);opacity:1} }

/* ── SVG CARD : prend tout l'espace restant ── */
.circuit-card {
  width: 100%;
  flex: 1 1 0;
  min-height: 0;
  background: rgba(255,255,255,0.07);
  border: 2.5px solid rgba(255,255,255,0.18);
  border-radius: 20px;
  padding: 10px;
  backdrop-filter: blur(18px);
  box-shadow: 0 16px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#circuit {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── DESC ── */
.desc {
  font-size: clamp(10px, 1.6vw, 13px);
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  text-align: center;
  background: rgba(0,0,0,0.4);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 7px 18px;
  backdrop-filter: blur(12px);
  max-width: min(90vw, 760px);
  line-height: 1.4;
  flex-shrink: 0;
  animation: fadeUp 0.4s ease forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

/* ── PROGRESS ── */
.progress {
  width: min(88vw, 680px);
  display: flex; gap: 5px;
  flex-shrink: 0;
}
.seg {
  flex:1; height:6px; border-radius:3px;
  background:rgba(255,255,255,0.14);
  overflow:hidden; cursor:pointer;
  transition:transform .15s;
}
.seg:hover { transform:scaleY(1.8); }
.seg.active .fill { animation:grow var(--d,4s) linear forwards; }
@keyframes grow { from{width:0} to{width:100%} }
.fill { height:100%; width:0; border-radius:3px; background:white; }
.seg.past .fill { width:100%; opacity:.4; }

/* ── CONTROLS ── */
.controls { display:flex; gap:10px; flex-shrink:0; }
.btn {
  font-family:'Fredoka One',cursive;
  font-size:clamp(11px,1.8vw,14px);
  padding:6px 18px; border-radius:999px;
  border:2px solid rgba(255,255,255,0.28);
  background:rgba(0,0,0,0.35); color:white;
  cursor:pointer; backdrop-filter:blur(10px); letter-spacing:1px;
  transition:all .18s;
}
.btn:hover  { background:rgba(255,255,255,0.2); transform:scale(1.06); }
.btn:active { transform:scale(.94); }

/* ── SVG STYLES ── */
/* ── PATENT BANNER ── */
.patent-bar {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(8px, 2.5vw, 28px);
  padding: 6px 16px;
  background: rgba(0,0,0,0.45);
  border: 1.5px solid rgba(255,255,255,0.22);
  border-radius: 12px;
  backdrop-filter: blur(14px);
  flex-wrap: wrap;
}
.patent-item { display:flex; align-items:center; gap:6px; white-space:nowrap; }
.patent-flag { font-size:clamp(14px,2.2vw,20px); line-height:1; }
.patent-text { font-family:'Fredoka One',cursive; font-size:clamp(10px,1.7vw,14px); color:rgba(255,255,255,0.95); letter-spacing:0.5px; }
.patent-num  { font-family:'Nunito',sans-serif; font-size:clamp(9px,1.4vw,12px); color:rgba(255,255,255,0.52); font-weight:700; }
.patent-sep  { width:1px; height:22px; background:rgba(255,255,255,0.2); flex-shrink:0; }

.pipe { fill:none; stroke:rgba(255,255,255,0.08); stroke-width:5; stroke-linecap:round; stroke-linejoin:round; }

/* Tuyau actif : tube éclairé de l'intérieur */
.on  { stroke-width:8; stroke-linecap:round; stroke-linejoin:round; fill:none; opacity:0.35; }
.rev { stroke-width:8; stroke-linecap:round; stroke-linejoin:round; fill:none; opacity:0.35; }

.vbody { transition:all .3s cubic-bezier(.34,1.56,.64,1); }
.vopen {
  fill:rgba(0,255,140,.28)!important; stroke:#00ff8c!important; stroke-width:2.5!important;
  animation:vp 2s ease-in-out infinite;
}
@keyframes vp {
  0%,100%{filter:drop-shadow(0 0 7px #00ff8c)}
  50%    {filter:drop-shadow(0 0 18px #00ff8c) drop-shadow(0 0 30px rgba(0,255,140,.5))}
}
.vclosed { fill:rgba(255,50,80,.13)!important; stroke:rgba(255,50,80,.38)!important; stroke-width:1.8!important; filter:none; animation:none; }

#blades { transform-origin:127px 114px; }
.spin   { animation:spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

<script>
const MODES = [
  { label:'FILTRATION', bg:'linear-gradient(135deg,#0f4c81,#1a6fa8,#0a2a4a)', c:'#4dd9ff',
    V:{V1:1,V2:0,V3:0,V4:1,V5:0,V6:1},
    on:['p1','p2','p3','p4','p8','p9','p10','p13','p14','p15'], rev:[],
    pump:1, wg:0, rg:1, fa:1, pf:'😤', ff:'😄',
    desc:'Water drawn from the pool passes through the filter top-to-bottom and returns clean to the pool.', d:5000 },

  { label:'BACKWASH', bg:'linear-gradient(135deg,#7a2d00,#c45400,#ff8c00)', c:'#ffb347',
    V:{V1:0,V2:1,V3:1,V4:1,V5:0,V6:0},
    on:['p1','p2','p11','p12','p5','p6','p7'], rev:['p10','p9','p8'],
    pump:1, wg:1, rg:0, fa:1, pf:'😤', ff:'🤢',
    desc:'Reverse-flow backwash! Water flows backwards through the filter, flushing contaminants out to the drain.', d:4500 },

  { label:'RINSE', bg:'linear-gradient(135deg,#3d0080,#7c3aed,#a855f7)', c:'#c084fc',
    V:{V1:1,V2:0,V3:0,V4:1,V5:1,V6:0},
    on:['p1','p2','p3','p4','p8','p9','p10','p13','p7'], rev:['p14','p16','p17'],
    pump:1, wg:1, rg:0, fa:1, pf:'😤', ff:'😌',
    desc:'Forward rinse after backwash. Residues are flushed out before returning to normal filtration.', d:4000 },

  { label:'RECIRC.', bg:'linear-gradient(135deg,#7a5c00,#c4940a,#f59e0b)', c:'#fcd34d',
    V:{V1:0,V2:0,V3:1,V4:0,V5:0,V6:1},
    on:['p1','p2','p11','p12','p13','p14','p15'], rev:[],
    pump:1, wg:0, rg:1, fa:0, pf:'😎', ff:'😴',
    desc:'Full filter bypass. Chlorine circulates throughout the pool without being absorbed by the filter.', d:4500 },

  { label:'DRAIN', bg:'linear-gradient(135deg,#5c0011,#991b1b,#ef4444)', c:'#f87171',
    V:{V1:0,V2:0,V3:1,V4:0,V5:1,V6:0},
    on:['p1','p2','p11','p12','p13','p7'], rev:['p14','p16','p17'],
    pump:1, wg:1, rg:0, fa:0, pf:'😤', ff:'😴',
    desc:'Direct drain without filtering. Water is sent straight to the sewer to empty the pool.', d:4500 },

  { label:'WINTER', bg:'linear-gradient(135deg,#0c2a4a,#1e4d7b,#bae6fd)', c:'#bae6fd',
    V:{V1:1,V2:1,V3:1,V4:1,V5:1,V6:1},
    on:[], rev:[], pump:0, wg:0, rg:0, fa:0, pf:'😴', ff:'🥶',
    desc:'All valves open, pump off. Anti-freeze purge of the pipes. The system hibernates!', d:4000 },

  { label:'OFF', bg:'linear-gradient(135deg,#111827,#1f2937,#374151)', c:'#9ca3af',
    V:{V1:0,V2:0,V3:0,V4:0,V5:0,V6:0},
    on:[], rev:[], pump:0, wg:0, rg:0, fa:0, pf:'😴', ff:'😐',
    desc:'System off. All valves closed. Well-deserved rest!', d:3500 }
];

const ALL=['p1','p2','p3','p4','p5','p6','p7','p8','p9','p10','p11','p12','p13','p14','p15','p16','p17'];
let cur=0, paused=false, timer=null;

// Build progress bar
const pg=document.getElementById('progress');
MODES.forEach((m,i)=>{
  const s=document.createElement('div'); s.className='seg'; s.id='s'+i;
  s.style.setProperty('--d',m.d+'ms'); s.onclick=()=>go(i);
  const f=document.createElement('div'); f.className='fill'; f.style.background=m.c;
  s.appendChild(f); pg.appendChild(s);
});

function apply(i){
  const m=MODES[i];
  document.getElementById('bg').style.background=m.bg;

  const pill=document.getElementById('pill');
  pill.textContent=m.label; pill.style.background=m.c; pill.style.color='#0a0a1a';
  pill.style.boxShadow=`0 4px 20px ${m.c}55, 3px 3px 0 rgba(0,0,0,0.2)`;
  pill.style.animation='none'; void pill.offsetWidth; pill.style.animation='popIn .45s cubic-bezier(.34,1.56,.64,1)';

  const desc=document.getElementById('desc');
  desc.textContent=m.desc; desc.style.animation='none'; void desc.offsetWidth; desc.style.animation='fadeUp .4s ease forwards';

  ALL.forEach(id=>{
    const e=document.getElementById(id); if(!e)return;
    e.classList.remove('on','rev'); e.style.stroke=''; e.style.filter='';
  });

  // Vider les gouttes existantes
  const dropsLayer = document.getElementById('drops-layer');
  dropsLayer.innerHTML = '';

  function spawnDrops(id, color, reverse) {
    const pathEl = document.getElementById(id); if(!pathEl) return;
    const pathLen = pathEl.getTotalLength ? pathEl.getTotalLength() : 50;
    // Durée proportionnelle à la longueur (~0.55s pour 50px)
    const dur = Math.max(0.4, (pathLen / 50 * 0.55)).toFixed(2);
    // Nombre de gouttes selon longueur du segment
    const nDrops = Math.max(3, Math.min(7, Math.round(pathLen / 22)));
    const ns = 'http://www.w3.org/2000/svg';
    const xlinkNs = 'http://www.w3.org/1999/xlink';

    for(let k = 0; k < nDrops; k++) {
      const phase = (k / nDrops * parseFloat(dur)).toFixed(3);
      // Variation naturelle taille et opacité entre les gouttes
      const r     = (3.2 + (k % 3) * 0.9).toFixed(1);
      const op    = (0.5 + (k % 3) * 0.15).toFixed(2);

      // ── Halo de lueur (grand cercle flou) ──
      const halo = document.createElementNS(ns, 'circle');
      halo.setAttribute('r', parseFloat(r) + 4);
      halo.setAttribute('fill', color + '30');
      halo.setAttribute('filter', 'url(#water-glow-soft)');
      const mHalo = document.createElementNS(ns, 'animateMotion');
      mHalo.setAttribute('dur', dur + 's');
      mHalo.setAttribute('begin', phase + 's');
      mHalo.setAttribute('repeatCount', 'indefinite');
      mHalo.setAttribute('keyTimes', '0;1');
      mHalo.setAttribute('calcMode', 'linear');
      if (reverse) mHalo.setAttribute('keyPoints', '1;0');
      const mpH = document.createElementNS(ns, 'mpath');
      mpH.setAttributeNS(xlinkNs, 'href', '#' + id);
      mHalo.appendChild(mpH);
      halo.appendChild(mHalo);
      dropsLayer.appendChild(halo);

      // ── Goutte principale ──
      const drop = document.createElementNS(ns, 'circle');
      drop.setAttribute('r', r);
      drop.setAttribute('fill', color);
      drop.setAttribute('opacity', op);
      drop.setAttribute('filter', 'url(#water-glow)');
      // Opacité pulsante (simuler reflet de surface)
      const aOp = document.createElementNS(ns, 'animate');
      aOp.setAttribute('attributeName', 'opacity');
      aOp.setAttribute('values', `${op};${(parseFloat(op)+0.25).toFixed(2)};${op}`);
      aOp.setAttribute('dur', (parseFloat(dur) * 0.4).toFixed(2) + 's');
      aOp.setAttribute('repeatCount', 'indefinite');
      drop.appendChild(aOp);
      const mDrop = document.createElementNS(ns, 'animateMotion');
      mDrop.setAttribute('dur', dur + 's');
      mDrop.setAttribute('begin', phase + 's');
      mDrop.setAttribute('repeatCount', 'indefinite');
      mDrop.setAttribute('keyTimes', '0;1');
      mDrop.setAttribute('calcMode', 'linear');
      if (reverse) mDrop.setAttribute('keyPoints', '1;0');
      const mpD = document.createElementNS(ns, 'mpath');
      mpD.setAttributeNS(xlinkNs, 'href', '#' + id);
      mDrop.appendChild(mpD);
      drop.appendChild(mDrop);
      dropsLayer.appendChild(drop);
    }
  }

  m.on.forEach(id=>{
    const e=document.getElementById(id); if(!e)return;
    e.classList.add('on');
    e.style.stroke = m.c+'55';
    e.style.filter = `drop-shadow(0 0 4px ${m.c}66)`;
    spawnDrops(id, m.c, false);
  });
  m.rev.forEach(id=>{
    const e=document.getElementById(id); if(!e)return;
    e.classList.add('rev');
    e.style.stroke = m.c+'55';
    e.style.filter = `drop-shadow(0 0 4px ${m.c}66)`;
    spawnDrops(id, m.c, true);
  });

  const ring=document.getElementById('pump-ring');
  const bl=document.getElementById('blades');
  if(m.pump){
    ring.style.stroke=m.c; ring.style.fill=m.c+'28'; ring.style.filter=`drop-shadow(0 0 14px ${m.c})`;
    bl.classList.add('spin');
  } else {
    ring.style.stroke='rgba(255,255,255,0.28)'; ring.style.fill='rgba(255,255,255,0.08)'; ring.style.filter='none';
    bl.classList.remove('spin');
  }


  ['V1','V2','V3','V4','V5','V6'].forEach(v=>{
    const open=m.V[v]; const p=document.getElementById('p'+v.toLowerCase()); if(!p)return;
    p.classList.remove('vopen','vclosed'); p.classList.add(open?'vopen':'vclosed');
    p.style.fill=open?m.c+'44':'';
  });

  const glow=(id,on,waste)=>{
    const e=document.getElementById(id); if(!e)return;
    if(on&&!waste){ e.style.fill=m.c+'22'; e.style.stroke=m.c; e.style.strokeWidth='2.5'; e.style.filter=`drop-shadow(0 0 10px ${m.c})`; }
    else if(on&&waste){ e.style.fill='rgba(255,80,80,.2)'; e.style.stroke='#ff5050'; e.style.strokeWidth='2.5'; e.style.filter='drop-shadow(0 0 10px rgba(255,80,80,.6))'; }
    else { e.style.fill='rgba(255,255,255,.08)'; e.style.stroke='rgba(255,255,255,.25)'; e.style.strokeWidth='2'; e.style.filter='none'; }
  };
  glow('box-pool',  m.pump, false);
  glow('box-pool2', m.rg,   false);
  glow('box-waste', m.wg,   true);

  const fr=document.getElementById('filter-rect');
  if(m.fa){ fr.style.fill=m.c+'1a'; fr.style.stroke=m.c; fr.style.strokeWidth='3'; fr.style.filter=`drop-shadow(0 0 14px ${m.c})`; }
  else { fr.style.fill='rgba(255,255,255,.06)'; fr.style.stroke='rgba(255,255,255,.17)'; fr.style.strokeWidth='2'; fr.style.filter='none'; }

  MODES.forEach((_,j)=>{
    const s=document.getElementById('s'+j); const f=s.querySelector('.fill');
    s.classList.remove('active','past');
    f.style.width=j<i?'100%':'0%'; f.style.opacity=j<i?'0.4':'1';
    if(j===i){ s.classList.add('active'); s.style.setProperty('--d',m.d+'ms'); }
  });

  // Phone screen sync
  const phoneScreen=document.getElementById('phone-screen');
  const phoneMode=document.getElementById('phone-mode');
  const phoneDot=document.getElementById('phone-dot');
  const phoneStatus=document.getElementById('phone-status');
  if(phoneScreen){ phoneScreen.style.fill=m.c+'2a'; }
  if(phoneMode){ phoneMode.textContent=m.label; phoneMode.style.fill=m.c; }
  if(phoneDot){ phoneDot.style.fill=m.pump?'rgba(0,255,140,0.7)':'rgba(255,80,80,0.7)'; phoneDot.style.stroke=m.pump?'#00ff8c':'#ff5050'; }
  if(phoneStatus){ phoneStatus.textContent=m.pump?'ACTIVE':'STANDBY'; }
}

function tick(){ clearTimeout(timer); if(paused)return; timer=setTimeout(()=>{ cur=(cur+1)%MODES.length; apply(cur); tick(); },MODES[cur].d); }
function go(i){ clearTimeout(timer); cur=i; apply(i); tick(); }
function next(){ clearTimeout(timer); cur=(cur+1)%MODES.length; apply(cur); tick(); }
function prev(){ clearTimeout(timer); cur=(cur-1+MODES.length)%MODES.length; apply(cur); tick(); }
function togglePause(){ paused=!paused; document.getElementById('btnPP').textContent=paused?'▶ Play':'⏸ Pause'; if(!paused)tick(); else clearTimeout(timer); }
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  if(e.key==='ArrowLeft') prev();
  if(e.key===' '){ e.preventDefault(); togglePause(); }
});

apply(0); tick();
</script>
</body>
</html>
